<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trip Segment Editor (Schema-Locked)</title>

  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      display: flex;
      height: 100vh;
    }

    #sidebar {
      width: 280px;
      border-right: 1px solid #ccc;
      padding: 10px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    #main {
      flex: 1;
      padding: 10px;
      box-sizing: border-box;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    h1 { font-size: 18px; margin: 0 0 8px; }
    h2 { font-size: 15px; margin: 10px 0 6px; }

    label {
      font-size: 12px;
      display: block;
      margin-top: 6px;
      margin-bottom: 2px;
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      box-sizing: border-box;
      font-size: 13px;
      padding: 4px 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      text-align: left;
    }

    textarea {
      min-height: 4em;
      max-height: 4em;
      resize: vertical;
    }

    .segment-item {
      padding: 4px 6px;
      margin-bottom: 3px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      border: 1px solid transparent;
    }

    .segment-item:hover { background: #f3f3f3; }
    .segment-item.active { border-color: #0078d4; background: #e6f2ff; }

    #form-container {
      flex: 1;
      overflow-y: auto;
      padding-right: 6px;
    }

    /* NEW LAYOUT SYSTEM */
    .row {
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: nowrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* FIXED WIDTHS */
    .w-distance { width: 90px; }
    .w-provider { width: 360px; }
    .w-dayno { width: 60px; }

    .w-date { width: 260px; }

    .w-website { width: 200px; }
    .w-phone { width: 160px; }
    .w-address { flex: 1; min-width: 260px; }

    .w-amount { width: 140px; }
    .w-currency { width: 90px; }
    .w-rate { width: 120px; }
    .w-rate-src { width: 260px; }

    .notes-full {
      width: 100%;
      min-height: 60px;
      resize: vertical;
    }

    .segment-group {
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 12px;
      border-radius: 4px;
    }

    .segment-group h3 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-top: 4px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 3px 4px;
    }

    #bottom-bar {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button {
      padding: 5px 10px;
      font-size: 13px;
      border-radius: 3px;
      border: 1px solid #0078d4;
      background: #0078d4;
      color: #fff;
      cursor: pointer;
    }

    button.secondary {
      background: #f3f3f3;
      color: #222;
      border-color: #ccc;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    #status {
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div id="sidebar">
    <h1>Segments</h1>

    <label>Load JSON file</label>
    <input type="file" id="file-input" accept=".json">

    <button id="download-json" class="secondary" disabled>
      Download updated JSON
    </button>

    <div id="status">No file loaded.</div>

    <h2>List</h2>

    <button id="new-segment" class="secondary">Add new segment</button>

    <div id="segment-list"></div>
  </div>

  <div id="main">
    <h1>Segment editor (schema-locked)</h1>

    <div id="form-container">
      <form id="segment-form">

        <!-- ========================= -->
        <!-- SECTION: BASIC INFO -->
        <!-- ========================= -->

        <div class="row">
          <div class="field" style="flex:1;">
            <label>Type</label>
            <input list="type-list" id="f-type">
            <datalist id="type-list">
              <option value="flight">
              <option value="layover">
              <option value="accommodation">
              <option value="transport">
              <option value="tour">
              <option value="activity">
              <option value="restaurant">
              <option value="car-rental">
              <option value="free-day">
              <option value="note">
              <option value="default">
            </datalist>
          </div>

          <div class="field" style="flex:1;">
            <label>Title</label>
            <input type="text" id="f-title">
          </div>

          <div class="field" style="flex:1;">
            <label>Description</label>
            <textarea id="f-description"></textarea>
          </div>
        </div>

        <div class="row">
          <div class="field" style="flex:1;">
            <label>From</label>
            <input type="text" id="f-from">
          </div>

          <div class="field" style="flex:1;">
            <label>To</label>
            <input type="text" id="f-to">
          </div>
        </div>

        <!-- ========================= -->
        <!-- SECTION: FLIGHT DETAILS -->
        <!-- ========================= -->

        <div class="segment-group">
          <h3>Flight details</h3>

          <!-- Distance + Provider + Day Number -->
          <div class="row">
            <div class="field w-distance">
              <label>Distance (#,###)</label>
              <input type="text" id="f-distanceKm">
            </div>

            <div class="field w-provider">
              <label>Provider (≤40 chars)</label>
              <input type="text" id="f-provider-name">
            </div>

            <div class="field w-dayno">
              <label>Day No.</label>
              <input type="text" id="f-provider-dayNumber">
            </div>
          </div>

<!-- ALL SIX DATES IN ONE ROW -->
<div class="row" style="flex-wrap: nowrap;">
  <div class="field w-date">
    <label>Depart Local</label>
    <input type="text" id="f-departLocal">
  </div>

  <div class="field w-date">
    <label>Depart UTC</label>
    <input type="text" id="f-startLocal">
  </div>

  <div class="field w-date">
    <label>Arrive Local</label>
    <input type="text" id="f-arriveLocal">
  </div>

  <div class="field w-date">
    <label>Arrive UTC</label>
    <input type="text" id="f-endLocal">
  </div>

  <div class="field w-date">
    <label>Return Local</label>
    <input type="text" id="f-checkInLocal">
  </div>

  <div class="field w-date">
    <label>Return UTC</label>
    <input type="text" id="f-checkOutLocal">
  </div>
</div>


          <!-- Website + Phone + Address -->
          <div class="row">
            <div class="field w-website">
              <label>Website</label>
              <input type="text" id="f-website">
            </div>

            <div class="field w-phone">
              <label>Phone</label>
              <input type="text" id="f-phone">
            </div>

            <div class="field w-address">
              <label>Address</label>
              <textarea id="f-address"></textarea>
            </div>
          </div>
        </div>
        <!-- ========================= -->
        <!-- SECTION: NOTES + BOOKING REFS -->
        <!-- ========================= -->

        <div class="row">
          <div class="field" style="flex:1;">
            <label>Notes (one line per array element)</label>
            <textarea id="f-notes"></textarea>
          </div>

          <div class="field" style="flex:1;">
            <label>Booking refs (one line per array element)</label>
            <textarea id="f-bookingRefs"></textarea>
          </div>
        </div>

        <!-- ========================= -->
        <!-- SECTION: CONFIRMATION -->
        <!-- ========================= -->

        <div class="row">
          <div class="field" style="flex:1;">
            <label>Confirmation</label>
            <input type="text" id="f-confirmation">
          </div>
        </div>

        <!-- ========================= -->
        <!-- SECTION: LOCATIONS -->
        <!-- ========================= -->

        <div class="segment-group">
          <h3>Locations</h3>

          <button type="button" id="add-location-row" class="secondary">
            Add location
          </button>

          <table id="locations-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Lat</th>
                <th>Lon</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- ========================= -->
        <!-- SECTION: ATTACHMENTS -->
        <!-- ========================= -->

        <div class="row">
          <div class="field" style="flex:1;">
            <label>Attachments (one line per array element)</label>
            <textarea id="f-attachments"></textarea>
          </div>
        </div>

        <!-- ========================= -->
        <!-- SECTION: COST -->
        <!-- ========================= -->

        <div class="segment-group">
          <h3>Cost</h3>

          <!-- Incurred Date -->
          <div class="row">
            <div class="field w-date">
              <label>Incurred Date (ISO‑8601)</label>
              <input type="text" id="f-cost-incurredDate">
            </div>
          </div>

          <!-- Local Amount + Currency -->
          <div class="row">
            <div class="field w-amount">
              <label>Local Amount (##,###.##)</label>
              <input type="text" id="f-cost-local-amount">
            </div>

            <div class="field w-currency">
              <label>Local Currency</label>
              <input type="text" id="f-cost-local-currency">
            </div>
          </div>

          <!-- AUD Amount + Rate + Source -->
          <div class="row">
            <div class="field w-amount">
              <label>AUD Amount (##,###.##)</label>
              <input type="text" id="f-cost-aud-amount">
            </div>

            <div class="field w-rate">
              <label>Forex Rate (8 digits)</label>
              <input type="text" id="f-cost-aud-rateUsed">
            </div>

            <div class="field w-rate-src">
              <label>Forex Rate Source (≤30 chars)</label>
              <input type="text" id="f-cost-aud-source">
            </div>
          </div>

          <!-- Cost Notes -->
          <div class="row">
            <div class="field" style="flex:1;">
              <label>Cost Notes</label>
              <textarea id="f-cost-costNotes" class="notes-full"></textarea>
            </div>
          </div>
        </div>

      </form>
    </div>

    <div id="bottom-bar">
      <button id="apply-segment" disabled>Apply changes to segment</button>
      <button id="download-json-main" class="secondary" disabled>
        Download updated JSON
      </button>
    </div>
  </div>
  <script>
    let data = null;
    let currentIndex = null;

    const fileInput = document.getElementById('file-input');
    const segmentListEl = document.getElementById('segment-list');
    const statusEl = document.getElementById('status');
    const downloadSidebarBtn = document.getElementById('download-json');
    const downloadMainBtn = document.getElementById('download-json-main');
    const applyBtn = document.getElementById('apply-segment');
    const newSegmentBtn = document.getElementById('new-segment');
    const addLocBtn = document.getElementById('add-location-row');

    const f = {
      type: document.getElementById('f-type'),
      title: document.getElementById('f-title'),
      description: document.getElementById('f-description'),
      from: document.getElementById('f-from'),
      to: document.getElementById('f-to'),
      departLocal: document.getElementById('f-departLocal'),
      arriveLocal: document.getElementById('f-arriveLocal'),
      startLocal: document.getElementById('f-startLocal'),
      endLocal: document.getElementById('f-endLocal'),
      checkInLocal: document.getElementById('f-checkInLocal'),
      checkOutLocal: document.getElementById('f-checkOutLocal'),
      distanceKm: document.getElementById('f-distanceKm'),
      providerName: document.getElementById('f-provider-name'),
      providerDayNumber: document.getElementById('f-provider-dayNumber'),
      notes: document.getElementById('f-notes'),
      bookingRefs: document.getElementById('f-bookingRefs'),
      confirmation: document.getElementById('f-confirmation'),
      website: document.getElementById('f-website'),
      phone: document.getElementById('f-phone'),
      address: document.getElementById('f-address'),
      locationsTableBody: document.querySelector('#locations-table tbody'),
      attachments: document.getElementById('f-attachments'),
      costIncurredDate: document.getElementById('f-cost-incurredDate'),
      costLocalAmount: document.getElementById('f-cost-local-amount'),
      costLocalCurrency: document.getElementById('f-cost-local-currency'),
      costAudAmount: document.getElementById('f-cost-aud-amount'),
      costAudRateUsed: document.getElementById('f-cost-aud-rateUsed'),
      costAudSource: document.getElementById('f-cost-aud-source'),
      costCostNotes: document.getElementById('f-cost-costNotes')
    };

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          if (!parsed || !Array.isArray(parsed.segments)) {
            setStatus('JSON must have a top-level "segments" array.');
            return;
          }

          data = parsed;
          currentIndex = null;
          buildSegmentList();
          setStatus(`Loaded ${file.name} with ${data.segments.length} segments.`);
          downloadSidebarBtn.disabled = false;
          downloadMainBtn.disabled = false;
          applyBtn.disabled = true;
          clearForm();

        } catch (err) {
          console.error(err);
          setStatus('Error parsing JSON.');
        }
      };

      reader.readAsText(file);
    });

    function buildSegmentList() {
      segmentListEl.innerHTML = '';
      if (!data) return;

      data.segments.forEach((seg, idx) => {
        const div = document.createElement('div');
        div.className = 'segment-item' + (idx === currentIndex ? ' active' : '');
        const t = seg.title || '(no title)';
        const ty = seg.type || '(no type)';
        div.textContent = `${idx + 1}. [${ty}] ${t}`;
        div.addEventListener('click', () => selectSegment(idx));
        segmentListEl.appendChild(div);
      });
    }

    function clearForm() {
      Object.values(f).forEach(el => {
        if (el instanceof HTMLInputElement || el instanceof HTMLTextAreaElement) {
          el.value = '';
        }
      });
      f.locationsTableBody.innerHTML = '';
    }

    function selectSegment(index) {
      if (!data) return;
      if (index < 0 || index >= data.segments.length) return;

      currentIndex = index;
      buildSegmentList();
      populateForm(data.segments[index]);
      applyBtn.disabled = false;
    }

    function populateForm(seg) {
      clearForm();

      f.type.value = seg.type ?? '';
      f.title.value = seg.title ?? '';
      f.description.value = seg.description ?? '';
      f.from.value = seg.from ?? '';
      f.to.value = seg.to ?? '';
      f.departLocal.value = seg.departLocal ?? '';
      f.arriveLocal.value = seg.arriveLocal ?? '';
      f.startLocal.value = seg.startLocal ?? '';
      f.endLocal.value = seg.endLocal ?? '';
      f.checkInLocal.value = seg.checkInLocal ?? '';
      f.checkOutLocal.value = seg.checkOutLocal ?? '';
      f.distanceKm.value = seg.distanceKm ?? '';

      const provider = seg.provider || {};
      f.providerName.value = provider.name ?? '';
      f.providerDayNumber.value = provider.dayNumber ?? '';

      f.notes.value = Array.isArray(seg.notes) ? seg.notes.join('\n') : '';
      f.bookingRefs.value = Array.isArray(seg.bookingRefs) ? seg.bookingRefs.join('\n') : '';

      f.confirmation.value = seg.confirmation ?? '';
      f.website.value = seg.website ?? '';
      f.phone.value = seg.phone ?? '';
      f.address.value = seg.address ?? '';

      const locs = Array.isArray(seg.locations) ? seg.locations : [];
      f.locationsTableBody.innerHTML = '';

      locs.forEach((loc, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input type="text" data-loc-index="${i}" data-field="name" value="${loc.name ?? ''}"></td>
          <td><input type="number" step="0.000001" data-loc-index="${i}" data-field="lat" value="${loc.lat ?? ''}"></td>
          <td><input type="number" step="0.000001" data-loc-index="${i}" data-field="lon" value="${loc.lon ?? ''}"></td>
          <td><button type="button" class="delete-loc" data-del-index="${i}">X</button></td>
        `;
        f.locationsTableBody.appendChild(tr);
      });

      f.attachments.value = Array.isArray(seg.attachments)
        ? seg.attachments.join('\n')
        : '';

      const cost = seg.cost || {};
      const local = cost.local || {};
      const aud = cost.aud || {};

      f.costIncurredDate.value = cost.incurredDate ?? '';
      f.costLocalAmount.value = local.amount ?? '';
      f.costLocalCurrency.value = local.currency ?? '';
      f.costAudAmount.value = aud.amount ?? '';
      f.costAudRateUsed.value = aud.rateUsed ?? '';
      f.costAudSource.value = aud.source ?? '';
      f.costCostNotes.value = cost.costNotes ?? '';
    }

    function textToArray(text) {
      return text
        .split('\n')
        .map(s => s.trim())
        .filter(s => s.length > 0);
    }

    function applyChangesToSegment(seg) {
      const typeVal = f.type.value.trim();
      if (typeVal === '') {
        alert('Type is required.');
        throw new Error('Missing type');
      }
      seg.type = typeVal;

      seg.title = f.title.value.trim() || null;
      seg.description = f.description.value.trim() || null;
      seg.from = f.from.value.trim() || null;
      seg.to = f.to.value.trim() || null;
      seg.departLocal = f.departLocal.value.trim() || null;
      seg.arriveLocal = f.arriveLocal.value.trim() || null;
      seg.startLocal = f.startLocal.value.trim() || null;
      seg.endLocal = f.endLocal.value.trim() || null;
      seg.checkInLocal = f.checkInLocal.value.trim() || null;
      seg.checkOutLocal = f.checkOutLocal.value.trim() || null;

      const dist = f.distanceKm.value.trim();
      seg.distanceKm = dist === '' ? null : Number(dist);

      seg.provider = seg.provider || {};
      seg.provider.name = f.providerName.value.trim() || null;

      const dayStr = f.providerDayNumber.value.trim();
      seg.provider.dayNumber = dayStr === '' ? null : Number(dayStr);

      seg.notes = textToArray(f.notes.value);
      seg.bookingRefs = textToArray(f.bookingRefs.value);

      seg.confirmation = f.confirmation.value.trim() || null;
      seg.website = f.website.value.trim() || null;
      seg.phone = f.phone.value.trim() || null;
      seg.address = f.address.value.trim() || null;

      const locInputs = f.locationsTableBody.querySelectorAll('input[data-loc-index]');
      const locMap = {};

      locInputs.forEach(inp => {
        const idx = Number(inp.getAttribute('data-loc-index'));
        const field = inp.getAttribute('data-field');
        const val = inp.value.trim();

        locMap[idx] = locMap[idx] || { name: null, lat: null, lon: null };

        if (field === 'name') {
          locMap[idx].name = val || null;
        }

        if (field === 'lat') {
          if (val === '') {
            locMap[idx].lat = null;
          } else if (!isFinite(Number(val))) {
            alert(`Invalid latitude in row ${idx + 1}`);
            throw new Error('Invalid latitude');
          } else {
            locMap[idx].lat = Number(val);
          }
        }

        if (field === 'lon') {
          if (val === '') {
            locMap[idx].lon = null;
          } else if (!isFinite(Number(val))) {
            alert(`Invalid longitude in row ${idx + 1}`);
            throw new Error('Invalid longitude');
          } else {
            locMap[idx].lon = Number(val);
          }
        }
      });

      seg.locations = Object.keys(locMap)
        .map(k => locMap[Number(k)])
        .filter(loc => loc.name !== null || loc.lat !== null || loc.lon !== null);

      seg.attachments = textToArray(f.attachments.value);

      seg.cost = seg.cost || {};
      seg.cost.local = seg.cost.local || {};
      seg.cost.aud = seg.cost.aud || {};

      seg.cost.incurredDate = f.costIncurredDate.value.trim() || null;

      const cla = f.costLocalAmount.value.trim();
      seg.cost.local.amount = cla === '' ? null : Number(cla);
      seg.cost.local.currency = f.costLocalCurrency.value.trim() || null;

      const caa = f.costAudAmount.value.trim();
      seg.cost.aud.amount = caa === '' ? null : Number(caa);

      const car = f.costAudRateUsed.value.trim();
      seg.cost.aud.rateUsed = car === '' ? null : Number(car);

      seg.cost.aud.source = f.costAudSource.value.trim() || null;

      const cnotes = f.costCostNotes.value.trim();
      seg.cost.costNotes = cnotes === '' ? null : cnotes;
    }

    newSegmentBtn.addEventListener('click', () => {
      if (!data) return;

      const blank = {
        type: "default",
        title: null,
        description: null,
        from: null,
        to: null,
        departLocal: null,
        arriveLocal: null,
        startLocal: null,
        endLocal: null,
        checkInLocal: null,
        checkOutLocal: null,
        distanceKm: null,
        provider: { name: null, dayNumber: null },
        notes: [],
        bookingRefs: [],
        confirmation: null,
        website: null,
        phone: null,
        address: null,
        locations: [],
        attachments: [],
        cost: {
          incurredDate: null,
          local: { amount: null, currency: null },
          aud: { amount: null, rateUsed: null, source: null },
          costNotes: null
        }
      };

      data.segments.push(blank);
      currentIndex = data.segments.length - 1;

      buildSegmentList();
      populateForm(blank);
      applyBtn.disabled = false;

      setStatus(`Created new blank segment #${currentIndex + 1}.`);
    });

    addLocBtn.addEventListener('click', () => {
      const idx = f.locationsTableBody.querySelectorAll('tr').length;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><input type="text" data-loc-index="${idx}" data-field="name"></td>
        <td><input type="number" step="0.000001" data-loc-index="${idx}" data-field="lat"></td>
        <td><input type="number" step="0.000001" data-loc-index="${idx}" data-field="lon"></td>
        <td><button type="button" class="delete-loc" data-del-index="${idx}">X</button></td>
      `;

      f.locationsTableBody.appendChild(tr);
    });

    f.locationsTableBody.addEventListener('click', e => {
      if (!e.target.classList.contains('delete-loc')) return;

      const idx = Number(e.target.getAttribute('data-del-index'));
      const rows = Array.from(f.locationsTableBody.querySelectorAll('tr'));

      if (!rows[idx]) return;
      rows[idx].remove();

      const newRows = f.locationsTableBody.querySelectorAll('tr');
      newRows.forEach((tr, newIdx) => {
        tr.querySelectorAll('input').forEach(inp => {
          inp.setAttribute('data-loc-index', newIdx);
        });
        tr.querySelector('.delete-loc')
          .setAttribute('data-del-index', newIdx);
      });
    });

    applyBtn.addEventListener('click', () => {
      if (!data || currentIndex == null) return;

      try {
        applyChangesToSegment(data.segments[currentIndex]);
        setStatus(`Segment ${currentIndex + 1} updated in memory. Run your schema checker to verify.`);
      } catch (e) {
        console.error(e);
      }
    });

    function downloadJson() {
      if (!data) return;

      const blob = new Blob([JSON.stringify(data, null, 2)], {
        type: 'application/json'
      });

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');

      a.href = url;
      a.download = 'balkans-2026-updated.json';

      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);

      setStatus('Downloaded updated JSON.');
    }

    downloadSidebarBtn.addEventListener('click', downloadJson);
    downloadMainBtn.addEventListener('click', downloadJson);
  </script>
</body>
</html>
